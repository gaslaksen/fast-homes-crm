[phases.install]
cmds = [
  "npm i -g corepack@latest && corepack enable && corepack prepare --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @fast-homes/shared run build",
  "pnpm --filter @fast-homes/api run prisma:generate",
  "pnpm --filter @fast-homes/api run build"
]

[start]
cmd = "node apps/api/dist/main"
